app = "ditare-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[checks]
  [checks.alive]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    port = 8080
    timeout = "5s"
    type = "http"
